---
layout: archive
permalink: /year-archive/
title: "Blog posts"
author_profile: true
---

{% for post in site.posts %}
  <div style="margin-bottom: 60px; border-bottom: 2px solid #f2f2f2; padding-bottom: 30px;">
    
    <h2><a href="{{ post.url | relative_url }}" style="text-decoration: none;">{{ post.title }}</a></h2>
    
    <p style="font-size: 0.85em; color: gray;">
      <i class="fas fa-calendar-alt"></i> <strong>Published:</strong> {{ post.date | date: "%B %d, %Y" }}
    </p>
    
    <div style="margin-top: 20px;">
      {{ post.content }}
    </div>
    
  </div>
{% endfor %}
